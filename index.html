<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login - Vyshnavi 244637s</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    .logo { font-size: 50px; margin-bottom: 10px; }
    h2 { color: #1e3a8a; margin-bottom: 5px; }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 30px; }
    .input-group { text-align: left; margin-bottom: 20px; }
    label { display: block; margin-bottom: 5px; color: #334155; font-weight: 500; }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
    }
    input:focus { outline: none; border-color: #667eea; }
    .options { display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 14px; }
    .remember { display: flex; align-items: center; gap: 5px; }
    a { color: #667eea; text-decoration: none; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    #message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      font-weight: 500;
    }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🎓</div>
    <h2>Student Login</h2>
    <p class="subtitle">Vyshnavi - 244637s</p>
    <div class="input-group">
      <label>Roll Number / Email</label>
      <input type="text" id="username" placeholder="Enter your roll number">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>
    <div class="options">
      <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me</label>
      </div>
      <a href="#">Forgot Password?</a>
    </div>
    <button onclick="login()">Login</button>
    <div id="message"></div>
    <p style="margin-top: 20px; font-size: 14px;">Don't have an account? <a href="#">Sign Up</a></p>
  </div>
  <script>
    function login() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const msg = document.getElementById('message');
      if (user === '244637s' && pass === 'vyshnavi123') {
        msg.className = 'success';
        msg.innerHTML = '✅ Login Successful! Welcome Vyshnavi';
        msg.style.display = 'block';
      } else {
        msg.className = 'error';
        msg.innerHTML = '❌ Invalid Roll Number or Password';
        msg.style.display = 'block';
      }
    }
  </script>
</body>
  </html>
