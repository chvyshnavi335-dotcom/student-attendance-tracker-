<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDMSMK - Attendance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .header { background: rgba(0,0,0,0.1); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; }
        .header p { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .date { text-align: center; color: white; margin: 15px 0; font-size: 16px; }
        .add-form { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .add-form h3 { margin-bottom: 15px; color: #333; }
        .add-form input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .add-btn { width: 100%; background: #4CAF50; color: white; padding: 12px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .add-btn:hover { background: #45a049; }
        .search { width: 100%; padding: 12px; margin: 15px 0; border: none; border-radius: 5px; background: white; }
        .stats { display: flex; justify-content: space-around; background: white; padding: 15px; border-radius: 10px; margin: 15px 0; }
        .stats div { text-align: center; }
        .stats .num { font-size: 24px; font-weight: bold; color: #667eea; }
        .stats .label { font-size: 12px; color: #666; }
        .student-card { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .student-info { flex: 1; }
        .student-name { font-size: 18px; font-weight: bold; margin: 5px 0; }
        .student-status { font-size: 14px; color: #666; }
        .roll { background: #667eea; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
        .parent { font-size: 12px; color: #999; margin-top: 3px; }
        .actions { display: flex; gap: 10px; }
        .btn { width: 50px; height: 50px; border: none; border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: bold; }
        .btn-p { background: #4CAF50; color: white; }
        .btn-a { background: #f44336; color: white; }
        .btn-x { background: #999; color: white; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SDMSMK - Class 302</h1>
        <p>Student Attendance System</p>
    </div>

    <div class="container">
        <div class="date">📅 Date: <span id="today"></span></div>

        <div class="add-form">
            <h3>➕ Add New Student</h3>
            <input type="text" id="rollNo" placeholder="Roll No (Ex: 1)">
            <input type="text" id="studentName" placeholder="Student Name (Ex: Rahul)">
            <input type="tel" id="parentNumber" placeholder="Parent Number (Ex: 9490475335)">
            <button class="add-btn" onclick="addStudent()">Add Student</button>
        </div>

        <input type="text" class="search" id="searchBox" placeholder="🔍 Search Student..." onkeyup="searchStudent()">

        <div class="stats">
            <div>
                <div class="num" id="presentCount">0</div>
                <div class="label">Present</div>
            </div>
            <div>
                <div class="num" id="absentCount">0</div>
                <div class="label">Absent</div>
            </div>
            <div>
                <div class="num" id="totalCount">0</div>
                <div class="label">Total</div>
            </div>
        </div>

        <div id="studentList"></div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('students')) || [];
        
        document.getElementById('today').textContent = new Date().toLocaleDateString('en-IN');
        
        function addStudent() {
            let roll = document.getElementById('rollNo').value.trim();
            let name = document.getElementById('studentName').value.trim();
            let parentNum = document.getElementById('parentNumber').value.trim();
            
            if(!roll ||!name ||!parentNum) {
                alert("Roll, Name, Parent Number anni fill chey");
                return;
            }
            
            if(parentNum.length!== 10) {
                alert("Parent number 10 digits undali\nEx: 9490475335\n+91 vaddu, 0 vaddu");
                return;
            }
            
            if(students.find(s => s.roll === roll)) {
                alert("Ee Roll number already undi");
                return;
            }
            
            students.push({
                roll: roll, 
                name: name, 
                parent: parentNum,
                status: 'Present'
            });
            
            saveData();
            renderStudents();
            
            document.getElementById('rollNo').value = '';
            document.getElementById('studentName').value = '';
            document.getElementById('parentNumber').value = '';
        }
        
        function markPresent(roll) {
            let student = students.find(s => s.roll === roll);
            student.status = 'Present';
            saveData();
            renderStudents();
        }
        
        function markAbsent(roll) {
            let student = students.find(s => s.roll === roll);
            student.status = 'Absent';
            saveData();
            renderStudents();
            
            let date = new Date().toLocaleDateString('en-IN');
            let message = `SDMSMK School: Mee pillalu ${student.name} (${student.roll}) ee roju ${date} na school ki raaledu. Gamaninchagalaru.`;
            
            let smsURL = `sms:${student.parent}?body=${encodeURIComponent(message)}`;
            window.location.href = smsURL;
        }
        
        function deleteStudent(roll) {
            if(confirm('Ee student ni delete cheyala?')) {
                students = students.filter(s => s.roll!== roll);
                saveData();
                renderStudents();
            }
        }
        
        function renderStudents() {
            let list = document.getElementById('studentList');
            let search = document.getElementById('searchBox').value.toLowerCase();
            
            let filtered = students.filter(s => 
                s.name.toLowerCase().includes(search) || 
                s.roll.toLowerCase().includes(search)
            );
            
            list.innerHTML = filtered.map(s => `
                <div class="student-card">
                    <div class="student-info">
                        <span class="roll">Roll ${s.roll}</span>
                        <div class="student-name">${s.name}</div>
                        <div class="student-status">${s.status}</div>
                        <div class="parent">📱 ${s.parent}</div>
                    </div>
                    <div class="actions">
                        <button class="btn btn-p" onclick="markPresent('${s.roll}')">P</button>
                        <button class="btn btn-a" onclick="markAbsent('${s.roll}')">A</button>
                        <button class="btn btn-x" onclick="deleteStudent('${s.roll}')">×</button>
                    </div>
                </div>
            `).join('');
            
            updateStats();
        }
        
        function updateStats() {
            let present = students.filter(s => s.status === 'Present').length;
            let absent = students.filter(s => s.status === 'Absent').length;
            document.getElementById('presentCount').textContent = present;
            document.getElementById('absentCount').textContent = absent;
            document.getElementById('totalCount').textContent = students.length;
        }
        
        function searchStudent() {
            renderStudents();
        }
        
        function saveData() {
            localStorage.setItem('students', JSON.stringify(students));
        }
        
        renderStudents();
    </script>
</body>
    </html>
