<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vyshnavi Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; color: #fff;
    }
    .login-box {
      background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px;
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
      width: 90%; max-width: 400px; text-align: center;
    }
    h1 { margin-bottom: 30px; color: #4ecdc4; }
    input {
      width: 100%; padding: 15px; margin: 10px 0; border: none;
      border-radius: 10px; background: rgba(255,255,255,0.2);
      color: #fff; font-size: 16px; outline: none;
    }
    input::placeholder { color: #ccc; }
    button {
      width: 100%; padding: 15px; margin-top: 20px; border: none;
      border-radius: 10px; background: #4ecdc4; color: #000;
      font-size: 18px; font-weight: bold; cursor: pointer;
    }
    button:hover { background: #45b7aa; }
    #error { color: #ff6b6b; margin-top: 15px; height: 20px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Vyshnavi 💚 Login</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error"></p>
  </div>

  <script>
    // Already login ayyi unte direct dashboard ki pampistadi
    if (localStorage.getItem('loggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }
    function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  // NUVVU KOTTEVI IKKADE SET CHEYYI
  if (email === 'vyshnavi@gmail.com' && password === '123456') {
    localStorage.setItem('loggedIn', 'true');
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('error').textContent = 'Invalid email or password!';
  }
    }
    
  </script>
</body>
</html>
