<!DOCTYPE html>
<html>
<head>
    <title>VS Code Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1e1e1e; color: white; font-family: monospace; margin: 0; padding: 0; }
        .header { background: #333; padding: 15px; font-size: 18px; }
        .btn { background: #0e639c; color: white; padding: 10px 20px; border: none; margin: 10px; }
        textarea { width: 94%; height: 70vh; background: #1e1e1e; color: #d4d4d4; border: 1px solid #444; margin: 10px; padding: 10px; }
    </style>
</head>
<body>
    <div class="header">VS Code Editor</div>
    <button class="btn" onclick="alert('Running...')">RUN CODE</button>
    <textarea placeholder="Write your code here..."></textarea>
</body>
</html>
