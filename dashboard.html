<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Code Editor</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCb3tjmpwPQ3CoaDuTlQ1xS_84URINahwo",
            authDomain: "student-login-page-b90a8.firebaseapp.com",
            projectId: "student-login-page-b90a8",
            storageBucket: "student-login-page-b90a8.appspot.com",
            messagingSenderId: "491746626259",
            appId: "1:491746626259:web:ae8997c91d9aa2b3e176f0"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html"; 
            } else {
                document.getElementById("userEmail").innerText = user.email;
            }
        });
        
        window.logout = () => signOut(auth);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1e1e1e; color: white; height: 100vh; overflow: hidden; }
        .topbar { background: #333; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        .topbar button { padding: 8px 12px; background: #f44336; border: none; color: white; cursor: pointer; border-radius: 4px; }
        #controls { padding: 8px; background: #2a2a2a; display: flex; gap: 8px; }
        #run-btn { padding: 8px 15px; background: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        #language { padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        #container { height: calc(100vh - 106px); display: flex; flex-direction: column; }
        #editor { width: 100%; height: 65%; }
        #output { width: 100%; height: 35%; background: #111; padding: 10px; overflow: auto; font-family: monospace; color: #0f0; border-top: 2px solid #333; }
    </style>
</head>
<body>
    <div class="topbar">
        <span>Welcome: <b id="userEmail"></b></span>
        <button onclick="logout()">Logout</button>
    </div>
    
    <div id="controls">
        <select id="language">
            <option value="javascript">JavaScript</option>
            <option value="html">HTML</option>
        </select>
        <button id="run-btn">▶ RUN CODE</button>
    </div>
    
    <div id="container">
        <div id="editor"></div>
        <div id="output">👉 Welcome Vyshnavi! Code type chesi RUN kottu</div>
    </div>

    <script>
        let editor;
        require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' }});
        
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: 'console.log("Hello Vyshnavi!");\n\nlet a = 10;\nlet b = 20;\nconsole.log("Sum =", a + b);',
                language: 'javascript',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: false }
            });
        });

        document.getElementById('language').onchange = (e) => {
            monaco.editor.setModelLanguage(editor.getModel(), e.target.value);
        };

        document.getElementById('run-btn').onclick = () => {
            const code = editor.getValue();
            const outputDiv = document.getElementById('output');
            const lang = document.getElementById('language').value;
            outputDiv.innerHTML = '';
            
            if(lang === 'javascript'){
                const oldLog = console.log;
                console.log = (...args) => {
                    outputDiv.innerHTML += args.join(' ') + '<br>';
                };
                try { eval(code); } 
                catch (err) { outputDiv.innerHTML += `<span style="color:red">Error: ${err.message}</span>`; }
                console.log = oldLog;
            } 
            else if(lang === 'html'){
                outputDiv.innerHTML = `<iframe style="width:100%;height:100%;border:none;background:white;" srcdoc="${code.replace(/"/g, '&quot;')}"></iframe>`;
            }
        };
    </script>
</body>
</html>
