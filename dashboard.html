<!DOCTYPE html>
<html>
<head>
    <title>VS Code Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1e1e1e; color: white; font-family: monospace; margin: 0; padding: 0; }
        .header { background: #333; padding: 15px; font-size: 18px; }
        .btn { background: #0e639c; color: white; padding: 10px 15px; border: none; margin: 10px; cursor: pointer; }
        #editor { width: 94%; height: 50vh; background: #1e1e1e; color: #d4d4d4; border: 1px solid #444; margin: 10px; padding: 10px; font-size: 14px; }
        #output { width: 94%; height: 20vh; background: #000; color: #00ff00; border: 1px solid #444; margin: 10px; padding: 10px; font-size: 14px; overflow: auto; }
    </style>
</head>
<body>
    <div class="header">VS Code Editor</div>
    <button onclick="logout()" style="background:#ff4757; color:white; border:none; padding:6px 12px; border-radius:5px; margin:10px;">Change User</button>
    <button class="btn" onclick="runCode()">RUN CODE</button>
    <textarea id="editor" placeholder="Write JavaScript code here...
Example: console.log('Hello Vyshnavi')"></textarea>
    <div style="margin-left:10px;">Output:</div>
    <div id="output"></div>

    <script>
    // Multi-user + Refresh ayina data povadu
let currentUsername = "";

window.onload = function() {
    // 1. User peru teesuko
    currentUsername = localStorage.getItem('currentUser');
    if(!currentUsername) {
        currentUsername = prompt("Welcome! Nee peru enter cheyyi:");
        if(!currentUsername || currentUsername.trim() === "") {
            currentUsername = "Guest" + Math.floor(Math.random() * 100);
        }
        localStorage.setItem('currentUser', currentUsername);
    }
    
    // 2. Header change cheyyi
    document.querySelector('.header').innerHTML = `Hi ${currentUsername} 💚 | VS Code`;
    
    // 3. MUNDU EDITOR KHALI CHEYYI - IDI IMPORTANT
    document.getElementById('editor').value = "";
    
    // 4. TARVATA SAVED CODE LOAD CHEYYI
    let savedCode = localStorage.getItem('usercode_' + currentUsername);
    if(savedCode) {
        document.getElementById('editor').value = savedCode;
    } else {
        document.getElementById('editor').value = "// Hi " + currentUsername + "\n// Code raayu ikkada";
        // First time ayithe ade save cheyyi
        localStorage.setItem('usercode_' + currentUsername, document.getElementById('editor').value);
    }
    
    // 5. AUTO SAVE - Prathi letter type cheste save avutadi
    document.getElementById('editor').addEventListener('input', function() {
        localStorage.setItem('usercode_' + currentUsername, this.value);
    });
};

// User change cheyadaniki
function logout() {
    if(confirm("User change cheyyala? Nee code save ayyindi.")) {
        localStorage.removeItem('currentUser');
        location.reload();
    }
}

// Run code function - alane unchukondi
function runCode() {
    let code = document.getElementById('editor').value;
    let output = document.getElementById('output');
    output.innerHTML = ''; 
    try {
        let oldLog = console.log;
        console.log = function(msg) { output.innerHTML += msg + '<br>'; }
        eval(code);
        console.log = oldLog;
    } catch (e) {
        output.innerHTML = 'Error: ' + e.message;
    }
           }
    </script>
</body>
</html>
