<!DOCTYPE html>
<html>
<head>
  <title>VS Code Editor</title>
  <style>
    body{background:#1e1e1e;color:white;font-family:monospace;margin:0;padding:10px}
    .header{background:#007acc;padding:10px;margin-bottom:10px}
    textarea{width:100%;height:70vh;background:#1e1e1e;color:white;border:1px solid #555;padding:10px}
    #output{background:#252526;padding:10px;margin-top:10px;min-height:50px}
  </style>
</head>
<body>
  <div class="header">VS Code Editor</div>
  <button onclick="logout()" style="background:#ff4757;color:white;border:none;padding:6px 12px;margin:10px 0;">Change User</button>
  <textarea id="editor" placeholder="Write code here"></textarea>
  <br><button onclick="runCode()" style="background:#0e639c;color:white;padding:10px;border:none;margin-top:10px;">Run</button>
  <div id="output"></div>

  <script>
    let currentUsername = "";
    window.onload = function() {
        currentUsername = localStorage.getItem('currentUser');
        if(!currentUsername) {
            currentUsername = prompt("Welcome! Nee peru enter cheyyi:");
            if(!currentUsername || currentUsername.trim() === "") {
                currentUsername = "Guest" + Math.floor(Math.random() * 100);
            }
            localStorage.setItem('currentUser', currentUsername);
        }
        document.querySelector('.header').innerHTML = `Hi ${currentUsername} 💚 | VS Code`;
        document.getElementById('editor').value = "";
        let savedCode = localStorage.getItem('usercode_' + currentUsername);
        if(savedCode) {
            document.getElementById('editor').value = savedCode;
        }
        document.getElementById('editor').addEventListener('input', function() {
            localStorage.setItem('usercode_' + currentUsername, this.value);
        });
    };
    function logout() {
        if(confirm("User change cheyyala?")) {
            localStorage.removeItem('currentUser');
            location.reload();
        }
    }
    function runCode() {
        let code = document.getElementById('editor').value;
        let output = document.getElementById('output');
        output.innerHTML = ''; 
        try {
            let oldLog = console.log;
            console.log = function(msg) { output.innerHTML += msg + '<br>'; }
            eval(code);
            console.log = oldLog;
        } catch (e) {
            output.innerHTML = 'Error: ' + e.message;
        }
    }
  </script>
</body>
</html>
