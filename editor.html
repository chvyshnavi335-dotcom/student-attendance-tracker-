<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #1a1a2e; }
    .header { background: #0f3460; padding: 15px; color: #4ecdc4; display: flex; justify-content: space-between; }
    .header button { background: #ff6b6b; color: white; border: none; padding: 8px 15px; border-radius: 8px; }
    .container { display: flex; height: calc(100vh - 55px); }
    .editors { width: 50%; display: flex; flex-direction: column; }
    .tabs { display: flex; background: #16213e; }
    .tab { padding: 12px 20px; background: #16213e; color: #aaa; border: none; cursor: pointer; }
    .tab.active { background: #1a1a2e; color: #4ecdc4; }
    .editor { flex: 1; display: none; }
    .editor.active { display: block; }
    textarea { width: 100%; height: 100%; background: #1a1a2e; color: #fff; border: none; padding: 15px; font-family: monospace; }
    .preview { width: 50%; background: white; display: flex; flex-direction: column; }
    .preview-header { background: #16213e; padding: 12px; display: flex; justify-content: space-between; }
    .preview-header span { color: #4ecdc4; }
    .run-btn { background: #4ecdc4; border: none; padding: 8px 20px; border-radius: 8px; }
    iframe { flex: 1; border: none; }
    @media(max-width: 768px) {
      .container { flex-direction: column; }
      .editors { width: 100%; height: 60vh; }
      .preview { width: 100%; height: 40vh; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Vyshnavi 💚 | Web Playground</h1>
    <button onclick="window.location.href='dashboard.html'">← Dashboard</button>
  </div>
  <div class="container">
    <div class="editors">
      <div class="tabs">
        <button class="tab active" onclick="showTab('html')">HTML</button>
        <button class="tab" onclick="showTab('css')">CSS</button>
        <button class="tab" onclick="showTab('js')">JS</button>
      </div>
      <div class="editor active" id="html-editor">
        <textarea id="html"><h1>Hello Vyshnavi 💚</h1></textarea>
      </div>
      <div class="editor" id="css-editor">
        <textarea id="css">h1 { color: #4ecdc4; text-align: center; }</textarea>
      </div>
      <div class="editor" id="js-editor">
        <textarea id="js">console.log('Hi');</textarea>
      </div>
    <div class="preview">
      <div class="preview-header">
        <span>Live Output</span>
        <button class="run-btn" onclick="runCode()">▶ Run</button>
      </div>
      <iframe id="output"></iframe>
    </div>
  </div>
  <script>
    if (localStorage.getItem('loggedIn') !== 'true') {
      window.location.href = 'index.html';
    }
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.editor').forEach(e => e.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + '-editor').classList.add('active');
    }
    function runCode() {
      const html = document.getElementById('html').value;
      const css = `<style>${document.getElementById('css').value}</style>`;
      const js = `<script>${document.getElementById('js').value}<\/script>`;
      document.getElementById('output').srcdoc = html + css + js;
    }
    window.onload = runCode;
  </script>
</body>
  </html>
