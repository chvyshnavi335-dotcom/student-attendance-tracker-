<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vyshnavi 💚 | Web Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; }
    .header {
      background: #0f3460; padding: 15px 20px; display: flex;
      justify-content: space-between; align-items: center;
      border-bottom: 2px solid #4ecdc4;
    }
    .header h1 { font-size: 20px; color: #4ecdc4; }
    .header span { color: #4ecdc4; }
    .header button {
      background: #ff6b6b; color: white; border: none;
      padding: 8px 15px; border-radius: 8px; cursor: pointer;
    }
    .container { display: flex; height: calc(100vh - 60px); }
    .editors { width: 50%; display: flex; flex-direction: column; }
    .tabs { display: flex; background: #16213e; }
    .tab {
      padding: 12px 20px; cursor: pointer; border: none;
      background: #16213e; color: #aaa; font-weight: 600;
    }
    .tab.active { background: #1a1a2e; color: #4ecdc4; border-bottom: 2px solid #4ecdc4; }
    .editor { flex: 1; display: none; }
    .editor.active { display: block; }
    textarea {
      width: 100%; height: 100%; background: #1a1a2e; color: #fff;
      border: none; padding: 15px; font-family: 'Courier New';
      font-size: 14px; resize: none; outline: none;
    }
    .preview { width: 50%; background: #fff; display: flex; flex-direction: column; }
    .preview-header {
      background: #16213e; padding: 12px 20px; display: flex;
      justify-content: space-between; align-items: center;
    }
    .preview-header span { color: #4ecdc4; font-weight: 600; }
    .run-btn {
      background: #4ecdc4; color: #000; border: none;
      padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    iframe { flex: 1; border: none; background: white; }
    @media(max-width: 768px) {
      .container { flex-direction: column; }
      .editors { width: 100%; height: 60vh; }
      .preview { width: 100%; height: 40vh; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Vyshnavi 💚 | <span>Web Playground</span></h1>
    <button onclick="goBack()">← Dashboard</button>
  </div>

  <div class="container">
    <div class="editors">
      <div class="tabs">
        <button class="tab active" onclick="showTab('html')">HTML</button>
        <button class="tab" onclick="showTab('css')">CSS</button>
        <button class="tab" onclick="showTab('js')">JS</button>
      </div>
      <div class="editor active" id="html-editor">
        <textarea id="html" placeholder="HTML ikkada raasuko..."><h1>Hello Vyshnavi 💚</h1></textarea>
      </div>
      <div class="editor" id="css-editor">
        <textarea id="css" placeholder="CSS ikkada raasuko...">h1 { color: #4ecdc4; text-align: center; }</textarea>
      </div>
      <div class="editor" id="js-editor">
        <textarea id="js" placeholder="JavaScript ikkada raasuko...">console.log('Hi Vyshnavi');</textarea>
      </div>
    </div>

    <div class="preview">
      <div class="preview-header">
        <span>Live Output</span>
        <button class="run-btn" onclick="runCode()">▶ Run</button>
      </div>
      <iframe id="output"></iframe>
    </div>
  </div>

  <script>
    if (localStorage.getItem('loggedIn') !== 'true') {
      window.location.href = 'index.html';
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.editor').forEach(e => e.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + '-editor').classList.add('active');
    }

    function runCode() {
      const html = document.getElementById('html').value;
      const css = `<style>${document.getElementById('css').value}</style>`;
      const js = `<script>${document.getElementById('js').value}<\/script>`;
      const output = document.getElementById('output');
      output.srcdoc = html + css + js;
    }

    function goBack() {
      window.location.href = 'dashboard.html';
    }

    window.onload = runCode;
  </script>
</body>
</html>
